{% extends "base.html" %}

{% block title %}AIRO · Ingreso{% endblock %}

{% block topnav %}
  <a class="secondary" href="/">Inicio</a>
{% endblock %}

{% block content %}
  <div class="login-shell">
    <div class="card">
      <h2 class="card-title">Ingresar a AIRO</h2>
      <p class="muted" style="margin-top:-4px; margin-bottom:18px;">
        Plataforma de dictado médico asistido.
      </p>

      <form action="/login" method="post">
        <label for="username">Usuario</label>
        <input type="text" name="username" id="username" required>

        <label for="password">Contraseña</label>
        <input type="password" name="password" id="password" required>

        <button type="submit">Entrar</button>
      </form>

      <p class="muted" style="margin-top:14px;">
        El inicio de sesión tiene una espera de seguridad.
      </p>

      {% if error %}
        <div class="notice error" style="margin-top:16px;">{{ error }}</div>
      {% endif %}
    </div>
  </div>
{% endblock %}
