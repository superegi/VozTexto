<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}AIRO{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <img src="/static/img/airo-logo.png" alt="AIRO logo">
        <div class="brand-text">
          <div class="title">AIRO</div>
          <div class="subtitle">Dictado médico asistido</div>
        </div>
      </div>

      <div class="nav">
        {% block topnav %}{% endblock %}
      </div>
    </div>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
